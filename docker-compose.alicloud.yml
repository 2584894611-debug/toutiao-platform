services:
  toutiao-platform:
    build:
      context: .
      dockerfile: Dockerfile.alicloud
    container_name: toutiao-platform
    restart: unless-stopped
    environment:
      COZE_PROJECT_ENV: PROD
      NODE_ENV: production
      DEPLOY_RUN_PORT: "5000"
      CHROMIUM_PATH: /usr/bin/chromium-browser
    ports:
      - "127.0.0.1:5000:5000"
